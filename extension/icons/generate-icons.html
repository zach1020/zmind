<!-- Open this in a browser to generate icon PNGs -->
<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const r = s * 0.2;
  // Gradient background
  const grad = ctx.createLinearGradient(0, 0, 0, s);
  grad.addColorStop(0, '#FF6EC7');
  grad.addColorStop(1, '#7B68EE');
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, r);
  ctx.fillStyle = grad;
  ctx.fill();
  // Z letter
  ctx.fillStyle = 'white';
  ctx.font = `bold ${s * 0.55}px system-ui`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Z', s/2, s/2 + s*0.02);
}
[16,48,128].forEach(size => {
  const c = document.getElementById('c' + size);
  drawIcon(c);
  // Download link
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = `icon${size}.png`;
  a.textContent = `Download ${size}x${size}`;
  document.body.appendChild(a);
  document.body.appendChild(document.createElement('br'));
});
</script>
